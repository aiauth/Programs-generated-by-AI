<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪传专业版 - 安全加密分享</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); }
        .tip-pop { animation: popUp 1.5s ease-out forwards; }
        @keyframes popUp { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; transform: translateY(-12px); } 80% { opacity: 1; transform: translateY(-12px); } 100% { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl border border-white p-8 relative overflow-hidden">
        
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">🛡️</div>
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">闪传 <span class="text-indigo-600">专业版</span></h1>
                <p class="text-xs text-slate-800 font-bold uppercase tracking-wider">高强度安全加密传输</p>
            </div>
        </div>

        <div id="drop-zone" class="relative group border-2 border-dashed border-slate-400 rounded-[2rem] p-10 text-center hover:border-indigo-500 hover:bg-indigo-50 transition-all cursor-pointer">
            <input type="file" id="fileInput" class="hidden">
            <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">🔐</div>
            <p class="text-slate-900 font-bold text-lg">点击或拖拽文件加密</p>
            <p class="text-xs text-slate-800 mt-2 font-black leading-relaxed">
                支持最大 2GB 文件分享<br>方便电脑、手机、平板跨端传输
            </p>
            
            <div id="progress-container" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center p-8 rounded-[1.9rem]">
                <div class="w-full bg-slate-100 rounded-full h-4 mb-4 overflow-hidden border border-slate-300">
                    <div id="progress-bar" class="bg-indigo-600 h-full w-0 transition-all"></div>
                </div>
                <span id="progress-percent" class="text-4xl font-black text-indigo-600">0%</span>
            </div>
        </div>

        <div id="result" class="hidden mt-8 space-y-5">
            <div class="flex gap-4 items-stretch">
                <div onclick="copy('accessCodeDisp', 'access-tip')" class="flex-1 p-6 bg-gradient-to-br from-indigo-600 to-slate-900 rounded-[2rem] text-white text-center cursor-pointer relative">
                    <p class="text-[10px] font-black uppercase mb-1">提取码 (点击复制)</p>
                    <p id="accessCodeDisp" class="text-5xl font-black tracking-tighter uppercase">-</p>
                    <span id="access-tip" class="hidden absolute -top-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full tip-pop">已复制!</span>
                </div>
                <div class="w-28 bg-white p-2 rounded-3xl border border-slate-200 flex items-center justify-center">
                    <div id="qrcode"></div>
                </div>
            </div>

            <div class="relative group cursor-pointer" onclick="copy('downLink', 'link-tip')">
                <div class="p-4 bg-white rounded-2xl border border-slate-400 shadow-sm group-hover:border-indigo-400 transition-colors">
                    <label class="text-[10px] font-black text-slate-800 uppercase block mb-1">分享链接 (点击复制)</label>
                    <input id="downLink" readonly class="w-full bg-transparent text-sm text-indigo-700 outline-none cursor-pointer font-bold truncate">
                </div>
                <span id="link-tip" class="hidden absolute -top-4 right-4 bg-emerald-600 text-white text-[10px] px-3 py-1 rounded-full tip-pop">已复制!</span>
            </div>

            <div class="flex items-center justify-between px-2">
                <button onclick="copy('delLink', 'del-tip')" class="text-[10px] font-black text-slate-600 hover:text-red-600 uppercase transition-colors relative">
                    复制销毁链接<input id="delLink" class="hidden">
                    <span id="del-tip" class="hidden absolute -top-8 left-0 bg-slate-800 text-white px-2 py-1 rounded tip-pop">已复制!</span>
                </button>
                <button onclick="location.reload()" class="text-[10px] font-black text-indigo-600 uppercase transition-colors">上传新文件</button>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-200 space-y-3">
            <p class="text-[11px] text-slate-900 font-bold leading-relaxed"><span class="mr-2">🔒</span>军工级加密：数据在传输前经过 AES-256 物理加密。</p>
            <p class="text-[11px] text-slate-900 font-bold leading-relaxed"><span class="mr-2">🔥</span>阅后即焚：文件存期 24 小时，超时后将彻底抹除数据。</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('fileInput');
        const zone = document.getElementById('drop-zone');
        zone.onclick = () => input.click();
        input.onchange = () => { if (input.files[0]) uploadFile(input.files[0]); };

        function uploadFile(file) {
            if (file.size > 2048*1024*1024) { alert("超过 2GB 限制"); return; }
            const formData = new FormData(); formData.append('file', file);
            const xhr = new XMLHttpRequest();
            document.getElementById('progress-container').classList.remove('hidden');
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const p = Math.round((e.loaded/e.total)*100);
                    document.getElementById('progress-bar').style.width = p+'%';
                    document.getElementById('progress-percent').innerText = p+'%';
                }
            };
            xhr.onload = () => {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    zone.classList.add('hidden'); document.getElementById('result').classList.remove('hidden');
                    document.getElementById('downLink').value = data.downloadUrl;
                    document.getElementById('delLink').value = data.deleteUrl;
                    document.getElementById('accessCodeDisp').innerText = data.accessCode;
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: data.downloadUrl, width: 96, height: 96, colorDark : "#1e293b" });
                } else { alert('上传异常'); location.reload(); }
            };
            xhr.open('POST', '/upload'); xhr.send(formData);
        }

        async function copy(id, tipId) {
            const el = document.getElementById(id); const tip = document.getElementById(tipId);
            const content = el.value || el.innerText;
            try {
                await navigator.clipboard.writeText(content); showTip(tip);
            } catch (err) {
                const ta = document.createElement("textarea"); ta.value = content; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showTip(tip);
            }
        }
        function showTip(tipEl) {
            tipEl.classList.remove('hidden');
            const n = tipEl.cloneNode(true); tipEl.parentNode.replaceChild(n, tipEl);
            setTimeout(() => n.classList.add('hidden'), 1500);
        }
    </script>
</body>
</html>
